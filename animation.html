<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EverFresh International - Premium Core Values Section</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Inter:wght@500;700&display=swap"
        rel="stylesheet">
</head>

<style>
    :root {
        --bg-dark: #030f05;
        --text-white: #ffffff;
        --brand-orange: #fe8a03;
        --brand-green: #479f27;
        --transition-premium: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* આખા પેજ પરથી આડી સ્ક્રોલબાર હટાવવાની ગેરંટી */
    html,
    body {
        max-width: 100%;
        overflow-x: hidden !important;
    }

    /* --- ✦ MAIN CONTAINER SETUP ✦ --- */
    .ef-interactive-showcase {
        background-color: var(--bg-dark);
        font-family: 'Inter', sans-serif;
        min-height: 80vh;
        width: 100%;
        max-width: 100vw;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 80px 4%;
        overflow: hidden !important;
        position: relative;
    }

    /* સેક્શનનું નાનું પ્રીમિયમ સબ-હેડિંગ */
    .ef-section-badge {
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 3px;
        color: var(--brand-green);
        font-weight: 700;
        margin-bottom: 30px;
        text-align: center;
    }

    /* --- ✦ IMAGES ROW STYLING ✦ --- */
    .ef-gallery-container {
        display: flex;
        justify-content: center;
        align-items: flex-end;
        gap: 16px;
        height: 140px;
        margin-bottom: 30px;
        padding: 10px;
        width: 100%;
        max-width: 800px;
    }

    .ef-img-box {
        width: 65px;
        height: 65px;
        border-radius: 12px;
        overflow: hidden;
        cursor: pointer;
        position: relative;
        transition: var(--transition-premium);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .ef-img-box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* --- ✦ HOVER EFFECTS ✦ --- */
    .ef-gallery-container:hover .ef-img-box {
        opacity: 0.25;
        transform: scale(0.85);
        filter: blur(2px);
    }

    .ef-gallery-container .ef-img-box:hover {
        opacity: 1;
        transform: scale(1.8) translateY(-20px);
        filter: blur(0px);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
        border-color: rgba(255, 255, 255, 0.2);
    }

    .ef-gallery-container .ef-img-box:hover img {
        transform: scale(1.15);
    }

    /* --- ✦ ⚡ એકદમ સેન્ટર લોક ટેક્સ્ટ રેપર ⚡ ✦ --- */
    .ef-display-text-wrapper {
        width: 100%;
        max-width: 100vw;
        height: 14vw;
        display: flex !important;
        justify-content: center !important;
        /* આડું સેન્ટર */
        align-items: center !important;
        /* ઊભું સેન્ટર */
        overflow: hidden !important;
        padding: 0 20px;
        text-align: center;
    }

    .ef-dynamic-title {
        font-family: 'Syne', sans-serif;
        font-size: 6.8vw;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: -2px;
        line-height: 1;
        color: var(--text-white);
        display: flex !important;
        justify-content: center !important;
        /* બધા અક્ષરોને સેન્ટરમાં રાખશે */
        align-items: center !important;
        flex-wrap: nowrap;
        white-space: nowrap;
        user-select: none;
        width: auto;
        /* ઓટોમેટિક કન્ટેન્ટ પ્રમાણે સેન્ટર થશે */
        margin: 0 auto;
    }

    /* સિંગલ અક્ષર (Letter) માટેનું એનિમેશન સ્ટાન્ડર્ડ */
    .ef-letter {
        display: inline-block;
        transform: translateY(120%);
        opacity: 0;
        filter: blur(8px);
        animation: revealLetterUp 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }

    /* --- ✦ GRAPH REVEAL KEYFRAMES ✦ --- */
    @keyframes revealLetterUp {
        0% {
            transform: translateY(120%);
            opacity: 0;
            filter: blur(10px);
        }

        100% {
            transform: translateY(0);
            opacity: 1;
            filter: blur(0px);
        }
    }

    /* --- 📱 PERFECT RESPONSIVE MEDIA QUERIES --- */
    @media (max-width: 1024px) {
        .ef-interactive-showcase {
            padding: 60px 4%;
        }

        .ef-gallery-container {
            gap: 12px;
            height: 110px;
        }

        .ef-img-box {
            width: 50px;
            height: 50px;
            border-radius: 8px;
        }

        .ef-gallery-container .ef-img-box:hover {
            transform: scale(1.6) translateY(-12px);
        }

        .ef-dynamic-title {
            font-size: 8.5vw;
            letter-spacing: -1px;
        }

        .ef-display-text-wrapper {
            height: 16vw;
        }
    }

    @media (max-width: 768px) {
        .ef-dynamic-title {
            font-size: 9vw;
        }

        .ef-display-text-wrapper {
            height: 18vw;
        }
    }

    @media (max-width: 600px) {
        .ef-interactive-showcase {
            padding: 50px 16px;
            min-height: 60vh;
        }

        .ef-section-badge {
            font-size: 0.8rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .ef-gallery-container {
            gap: 8px;
            height: 90px;
            margin-bottom: 15px;
        }

        .ef-img-box {
            width: 42px;
            height: 42px;
            border-radius: 6px;
        }

        .ef-gallery-container .ef-img-box:hover {
            transform: scale(1.4) translateY(-8px);
        }

        .ef-dynamic-title {
            font-size: 9vw;
            letter-spacing: -0.5px;
        }

        .ef-display-text-wrapper {
            height: 16vw;
        }
    }
</style>

<body>

    <section class="ef-interactive-showcase">

        <div class="ef-section-badge">Why Global Partners Choose Us</div>

        <div class="ef-gallery-container">

            <div class="ef-img-box" data-text="CUMIN KING" data-color="#ffffff">
                <img src="https://images.unsplash.com/photo-1599599810769-bcde5a160d32?q=80&w=300&auto=format&fit=cover"
                    alt="Premium Cumin Seeds">
            </div>

            <div class="ef-img-box" data-text="LAB TESTED" data-color="#fe8a03">
                <img src="https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?q=80&w=300&auto=format&fit=cover"
                    alt="Laboratory Quality Control">
            </div>

            <div class="ef-img-box" data-text="100% PURE" data-color="#479f27">
                <img src="https://images.unsplash.com/photo-1592417817098-8f3d6eb19675?q=80&w=300&auto=format&fit=cover"
                    alt="Natural Agriculture Fields">
            </div>

            <div class="ef-img-box" data-text="SORTEX CLEAN" data-color="#ffffff">
                <img src="https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?q=80&w=300&auto=format&fit=cover"
                    alt="Modern Processing Infrastructure">
            </div>

            <div class="ef-img-box" data-text="GLOBAL SHIP" data-color="#fe8a03">
                <img src="https://images.unsplash.com/photo-1494412574643-ff11b0a5c1c3?q=80&w=300&auto=format&fit=cover"
                    alt="International Vessel Port">
            </div>

            <div class="ef-img-box" data-text="PURE TRUST" data-color="#479f27">
                <img src="https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?q=80&w=300&auto=format&fit=cover"
                    alt="Reliable Trade Handshake">
            </div>

        </div>

        <div class="ef-display-text-wrapper">
            <h1 class="ef-dynamic-title" id="changing-title">EVERFRESH</h1>
        </div>

    </section>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const titleElement = document.getElementById("changing-title");
            const imgBoxes = document.querySelectorAll(".ef-img-box");

            function updateTextWithAnimation(newText, textColor) {
                titleElement.innerHTML = "";
                titleElement.style.color = textColor;

                const letters = newText.split("");

                letters.forEach((char, index) => {
                    const span = document.createElement("span");
                    span.textContent = char === " " ? "\u00A0" : char;
                    span.classList.add("ef-letter");
                    span.style.animationDelay = `${index * 0.03}s`;
                    titleElement.appendChild(span);
                });
            }

            updateTextWithAnimation("EVERFRESH", "#ffffff");

            imgBoxes.forEach(box => {
                box.addEventListener("mouseenter", function () {
                    const textToSet = this.getAttribute("data-text");
                    const colorToSet = this.getAttribute("data-color");
                    updateTextWithAnimation(textToSet, colorToSet);
                });
            });
        });
    </script>

</body>
</html>
