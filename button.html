<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    :root {
        --brand-light-green: #479f27;
        --brand-dark-green: #0a551c;
        --brand-orange: #fe8a03;
        --brand-orange-hover: #e07600;
        --bg-dark: #030f05;
        --text-light: #f9fafb;
        --transition-smooth: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
    }


    /* તમારી બ્લેક/ડાર્ક થીમ બેકગ્રાઉન્ડ ટેસ્ટિંગ માટે */
    body {
        background-color: var(--bg-dark);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    /* પ્રીમિયમ ગ્લાસ બટન */
    .export-glass-btn {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 16px 38px;

        /* ગ્લાસ ઇફેક્ટ (Glassmorphism) */
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);

        color: var(--text-light);
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 2.5px;
        text-transform: uppercase;

        /* રેડિયસ અને બોર્ડર સ્ટીલીંગ */
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 30px;
        /* સ્મૂથ પ્રીમિયમ કર્વ્ડ રેડિયસ */

        cursor: pointer;
        overflow: hidden;
        transition: var(--transition-smooth);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
    }

    /* આઇકોન કન્ટેનર - હવે ટેક્સ્ટની રાઇટ સાઇડ છે */
    .export-glass-btn .icon-container {
        position: relative;
        width: 24px;
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* ક્લાઉડ સેટિંગ્સ */
    .export-glass-btn .cloud-icon {
        position: absolute;
        right: -2px;
        top: 2px;
        transition: var(--transition-smooth);
    }

    /* પ્લેન સેટિંગ્સ */
    .export-glass-btn .plane-icon {
        position: absolute;
        z-index: 2;
        transition: var(--transition-smooth);
    }

    /* --- HOVER EFFECTS --- */

    /* 1. બટન હોવર - ગ્લાસ બેકગ્રાઉન્ડ બ્રાન્ડ ડાર્ક ગ્રીન તરફ શિફ્ટ થશે અને ઓરેન્જ ગ્લો આપશે */
    .export-glass-btn:hover {
        background: rgba(10, 85, 28, 0.2);
        /* var(--brand-dark-green) વિથ ઓપેસિટી */
        border-color: var(--brand-light-green);
        box-shadow: 0 0 25px rgba(71, 159, 39, 0.25);
        color: var(--text-light);
    }

    /* 2. વાદળ સહેજ જમણી તરફ ખસશે */
    .export-glass-btn:hover .cloud-icon {
        transform: translateX(4px);
        stroke: rgba(249, 250, 251, 0.6);
    }

    /* 3. પ્લેન રાઇટ સાઇડથી ઉડીને ગાયબ થશે અને લેફ્ટથી પાછું આવશે */
    .export-glass-btn:hover .plane-icon {
        stroke: var(--brand-orange-hover);
        animation: flyRightLoop 0.75s cubic-bezier(0.68, -0.6, 0.32, 1.6) forwards;
    }

    /* પ્લેન રાઇટ-સાઇડ લૂપ એનિમેશન */
    @keyframes flyRightLoop {
        0% {
            transform: translate(0, 0) scale(1);
            opacity: 1;
        }

        45% {
            transform: translate(35px, -12px) scale(0.8);
            /* જમણી બાજુ ઉપર ઉડી જશે */
            opacity: 0;
        }

        50% {
            transform: translate(-35px, 12px) scale(0.8);
            /* ડાબી બાજુ નીચેથી છૂપી એન્ટ્રી */
            opacity: 0;
        }

        100% {
            transform: translate(0, 0) scale(1);
            /* ઓરિજિનલ પ્લેસ પર ફિક્સ */
            opacity: 1;
        }
    }

    /* ટેક્સ્ટ હોવર ઇફેક્ટ */
    .export-glass-btn .btn-text {
        transition: var(--transition-smooth);
    }

    .export-glass-btn:hover .btn-text {
        transform: translateX(-2px);
        /* પ્લેન ઉડે ત્યારે ટેક્સ્ટ સહેજ બેલેન્સ થશે */
    }
</style>

<body>

    <button class="export-glass-btn">
        <span class="btn-text">Global Export</span>
        <div class="icon-container">
            <svg class="cloud-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                fill="none" stroke="rgba(249, 250, 251, 0.3)" stroke-width="1.5" stroke-linecap="round"
                stroke-linejoin="round">
                <path
                    d="M17.5 19A3.5 3.5 0 0 0 21 15.5c0-2.79-2.54-4.5-5-4.5-.72 0-1.42.21-2 .58A5.5 5.5 0 0 0 4 14c0 2.76 2.24 5 5 5h8.5z">
                </path>
            </svg>
            <svg class="plane-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                fill="none" stroke="var(--brand-orange)" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <!-- પ્લેન હવે પ્રોપરલી રાઇટ સાઇડ ફેસિંગ છે -->
                <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path>
            </svg>
        </div>
    </button>
  
</body>

</html>
