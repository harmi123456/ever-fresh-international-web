        function renderProducts(products) {
            const grid = document.getElementById('agroProductsGrid');
            grid.innerHTML = '';
            
            products.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.setAttribute('data-category', p.cat);
                
                card.innerHTML = `
                    <div class="product-img-box">
                        <span class="category-badge">${p.cat}</span>
                        <img src="${p.img}" alt="${p.name}" loading="lazy">
                    </div>
                    <div class="product-info">
                        <h2>${p.name}</h2>
                        <p>${p.desc}</p>
                        <a href="mailto:info@yourdomain.com?subject=Enquiry for ${p.name}" class="enquiry-btn">Get Quote</a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterCategory(category) {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            // Handle active selection check safely
            if(event && event.target) {
                event.target.classList.add('active');
            }

            if(category === 'all') {
                renderProducts(productsData);
            } else {
                const filtered = productsData.filter(p => p.cat === category);
                renderProducts(filtered);
            }
        }

        // Initialize grid on load
        renderProducts(productsData);
